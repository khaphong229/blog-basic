    <circle cx="352" cy="70" r="16" fill="#ffffff" stroke="none" />

    <!-- Letter A built with soft, thick lines -->
    <path d="M 256 160 L 140 390" stroke-width="56" />
    <path d="M 256 160 L 372 390" stroke-width="56" />
